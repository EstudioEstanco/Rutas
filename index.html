<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- A Google le gusta encontrar una buena descripción SEO -->
    <meta name="description" content="Estudio Estanco: Producción musical y sonido profesional en Asturias.">
    <title>Estudio Estanco | Producción Musical</title>
    
    <style>
        /* RESET BÁSICO */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #ffffff;
            /* FONDO 1 */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('img/IMG_2541') no-repeat center center fixed;
            background-size: cover;
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 50px 20px;
        }

        /* LOGO 1 */
        .logo {
            max-width: 200px;
            height: auto;
            margin-bottom: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }

        h1 { font-size: 3rem; text-transform: uppercase; margin-bottom: 10px; }

        /* GALERÍA DE FOTOS */
        .galeria {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }

        .galeria img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            transition: transform 0.3s ease;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .galeria img:hover {
            transform: scale(1.05);
            border-color: #ffffff;
        }

        /* REDES SOCIALES (ICONOS) */
        .redes {
            margin-top: 50px;
            padding: 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 50px;
            display: inline-block;
        }

        .redes a {
            text-decoration: none;
            margin: 0 15px;
        }

        .redes img {
            width: 40px; /* Tamaño de los iconos ico1, ico2... */
            height: 40px;
            transition: opacity 0.3s;
        }

        .redes img:hover { opacity: 0.7; }

        footer {
            margin-top: 50px;
            padding: 20px;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <header>
        <!-- Cambia logo1.png por tu archivo real -->
        <img src="img/Screenshot_2023" alt="Logo Estudio Estanco" class="logo">
        <h1>Estudio Estanco</h1>
        <p>Grabación, Mezcla y Mastering</p>
    </header>

    <main class="container">
        
        <!-- Sección de Galería -->
        <section>
            <h2>Galería del Estudio</h2>
            <div class="galeria">
                <img src="img/1000024012_Original" alt="Instalaciones 1">
                <img src="img/20200611_024252" alt="Instalaciones 2">
                <img src="img/IMG_1431_Original" alt="Instalaciones 3">
                <img src="img/IMG_20200617_002330_Original" alt="Instalaciones 4">
            </div>
        </section>

        <!-- Sección de Redes Sociales -->
        <nav class="redes">
            <a href="https://instagram.com/@estudioestanco" target="_blank">
                <img src="img/ico1.png" alt="Instagram">
            </a>
            <a href="https://facebook.com/tu-perfil" target="_blank">
                <img src="img/ico2.png" alt="Facebook">
            </a>
            <a href="https://youtube.com/tu-perfil" target="_blank">
                <img src="img/ico3.png" alt="YouTube">
            </a>
        </nav>

    </main>

    <footer>
        <p>&copy; 2026 Estudio Estanco. Bimenes, Asturias.</p>
    </footer>

</body>
</html>
